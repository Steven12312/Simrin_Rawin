name: Deploy to ALL-INKL via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: w02137ae.kasserver.com
        username: f0186f59
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /
        # If your ALL-INKL folder is a subfolder, change this to something like /subdomain-folder/
